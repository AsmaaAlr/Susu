<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bubble Wrap Page</title>
  <meta name="theme-color" content="#ffdff3" />
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    :root {
      --bg1: #fff2fb;
      --bg2: #e8f7ff;
      --bg3: #fff7d9;
      --bubble: rgba(255,255,255,0.55);
      --bubble-edge: rgba(255,255,255,0.95);
      --bubble-shadow: rgba(120, 140, 180, 0.12);
      --text: #5a5872;
      --card: rgba(255,255,255,0.72);
    }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, var(--bg2), transparent 30%),
        radial-gradient(circle at 80% 20%, var(--bg3), transparent 28%),
        radial-gradient(circle at 50% 80%, #f5e7ff, transparent 30%),
        linear-gradient(135deg, var(--bg1), #f5fbff 40%, #fff7ef);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 15%, rgba(255,255,255,0.7) 0 4%, transparent 8%),
        radial-gradient(circle at 85% 25%, rgba(255,255,255,0.5) 0 3%, transparent 7%),
        radial-gradient(circle at 60% 70%, rgba(255,255,255,0.45) 0 5%, transparent 9%);
      opacity: 0.8;
    }

    .ui {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 12px);
      left: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .title-box,
    .controls {
      pointer-events: auto;
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      box-shadow: 0 12px 35px rgba(103, 122, 163, 0.14);
    }

    .title-box {
      padding: 14px 18px;
      max-width: min(540px, 78vw);
    }

    .title-box h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1;
    }

    .title-box p {
      margin: 7px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }

    .controls {
      padding: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      font-size: 14px;
      background: rgba(255,255,255,0.92);
      color: var(--text);
      box-shadow: 0 8px 20px rgba(103, 122, 163, 0.12);
      cursor: pointer;
    }

    button:active {
      transform: scale(0.97);
    }

    #wrap {
      position: fixed;
      inset: 0;
      padding:
        calc(env(safe-area-inset-top) + 96px)
        14px
        calc(env(safe-area-inset-bottom) + 18px)
        14px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
      gap: 10px;
      align-content: start;
      overflow: auto;
      touch-action: none;
    }

    .bubble {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.95);
      background:
        radial-gradient(circle at 30% 28%, rgba(255,255,255,0.98) 0 10%, rgba(255,255,255,0.6) 11% 18%, transparent 19%),
        radial-gradient(circle at 50% 55%, rgba(255,255,255,0.65), rgba(240,245,255,0.35) 45%, rgba(220,235,255,0.2) 70%, rgba(255,255,255,0.35) 100%);
      box-shadow:
        inset 0 10px 14px rgba(255,255,255,0.65),
        inset 0 -10px 18px rgba(190, 210, 240, 0.22),
        0 10px 16px var(--bubble-shadow);
      transform: scale(1);
      transition:
        transform 140ms ease,
        box-shadow 220ms ease,
        background 220ms ease,
        opacity 220ms ease;
      cursor: pointer;
      overflow: hidden;
    }

    .bubble::after {
      content: "";
      position: absolute;
      inset: 14% 16% auto auto;
      width: 20%;
      height: 20%;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      filter: blur(1px);
      opacity: 0.85;
    }

    .bubble:hover {
      transform: scale(1.03);
    }

    .bubble.popped {
      transform: scale(0.82);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18), rgba(215,225,240,0.1) 50%, rgba(0,0,0,0.03) 100%);
      box-shadow:
        inset 0 10px 18px rgba(130,145,170,0.08),
        inset 0 -8px 14px rgba(120,130,150,0.08);
      opacity: 0.8;
    }

    .bubble.popped::after {
      opacity: 0.25;
    }

    .bubble.reinflating {
      animation: reinflate 220ms ease;
    }

    @keyframes reinflate {
      0% { transform: scale(0.82); }
      60% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    .sparkle,
    .pop-text {
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 30;
    }

    .sparkle {
      width: 70px;
      height: 70px;
      animation: sparkleOut 500ms ease-out forwards;
      filter: blur(0.2px);
    }

    .sparkle::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.95) 0 5%, transparent 6%),
        radial-gradient(circle at 20% 40%, rgba(255,210,240,0.85) 0 4%, transparent 5%),
        radial-gradient(circle at 78% 42%, rgba(210,240,255,0.85) 0 4%, transparent 5%),
        radial-gradient(circle at 42% 80%, rgba(255,245,180,0.85) 0 4%, transparent 5%);
    }

    .pop-text {
      font-size: 18px;
      animation: floatOut 700ms ease-out forwards;
      text-shadow: 0 3px 8px rgba(255,255,255,0.5);
    }

    @keyframes sparkleOut {
      from { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
      20% { opacity: 1; }
      to { transform: translate(-50%, -50%) scale(1.25); opacity: 0; }
    }

    @keyframes floatOut {
      from { transform: translate(-50%, -50%) translateY(0) scale(0.8); opacity: 0; }
      20% { opacity: 1; }
      to { transform: translate(-50%, -50%) translateY(-34px) scale(1.08); opacity: 0; }
    }

    .footer-note {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 14px);
      transform: translateX(-50%);
      z-index: 22;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      box-shadow: 0 10px 28px rgba(103, 122, 163, 0.13);
      pointer-events: none;
      animation: fadeHint 7s ease forwards;
    }

    @keyframes fadeHint {
      0%, 65% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 720px) {
      .ui {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: flex-start;
      }

      #wrap {
        grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
        gap: 8px;
        padding-top: calc(env(safe-area-inset-top) + 120px);
      }

      button {
        font-size: 13px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="ui">
    <div class="title-box">
      <h1>Bubble Wrap Page</h1>
      <p>tap, click, or drag your finger and pop everything</p>
    </div>

    <div class="controls">
      <button id="resetBtn" type="button">Refill</button>
      <button id="randomBtn" type="button">Pop Random</button>
      <button id="soundBtn" type="button">Sound: On</button>
    </div>
  </div>

  <main id="wrap" aria-label="Bubble wrap popping page"></main>
  <div class="footer-note">Drag across the bubbles for maximum chaos</div>

  <script>
    const wrap = document.getElementById("wrap");
    const resetBtn = document.getElementById("resetBtn");
    const randomBtn = document.getElementById("randomBtn");
    const soundBtn = document.getElementById("soundBtn");

    const POP_WORDS = ["pop!", "plop!", "bip!", "pfft!", "boop!"];
    let bubbles = [];
    let dragging = false;
    let soundEnabled = true;
    let audioCtx = null;

    function createAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playPopSound(variant = 0) {
      if (!soundEnabled) return;
      createAudio();

      const now = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = variant % 2 === 0 ? "triangle" : "square";
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(1800, now);
      filter.frequency.exponentialRampToValueAtTime(500, now + 0.08);

      const startFreq = 280 + Math.random() * 180;
      const endFreq = 110 + Math.random() * 40;

      osc.frequency.setValueAtTime(startFreq, now);
      osc.frequency.exponentialRampToValueAtTime(endFreq, now + 0.09);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.12, now + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.1);

      const burst = audioCtx.createBufferSource();
      const burstGain = audioCtx.createGain();
      const bufferSize = audioCtx.sampleRate * 0.035;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      }

      burst.buffer = buffer;
      burstGain.gain.setValueAtTime(0.04, now);
      burstGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);

      burst.connect(burstGain);
      burstGain.connect(audioCtx.destination);
      burst.start(now);
      burst.stop(now + 0.05);
    }

    function makeBubble() {
      const bubble = document.createElement("button");
      bubble.type = "button";
      bubble.className = "bubble";
      bubble.setAttribute("aria-label", "Bubble");
      bubble.dataset.popped = "false";

      bubble.addEventListener("pointerdown", (e) => {
        popBubble(bubble, e.clientX, e.clientY);
      });

      bubble.addEventListener("pointerenter", (e) => {
        if (dragging) popBubble(bubble, e.clientX, e.clientY);
      });

      return bubble;
    }

    function fillWrap() {
      wrap.innerHTML = "";
      bubbles = [];

      const area = window.innerWidth * window.innerHeight;
      const bubbleCount = Math.max(48, Math.min(220, Math.floor(area / 5200)));

      for (let i = 0; i < bubbleCount; i++) {
        const bubble = makeBubble();
        bubbles.push(bubble);
        wrap.appendChild(bubble);
      }
    }

    function sparkle(x, y) {
      const s = document.createElement("div");
      s.className = "sparkle";
      s.style.left = x + "px";
      s.style.top = y + "px";
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 500);
    }

    function popText(x, y) {
      const t = document.createElement("div");
      t.className = "pop-text";
      t.textContent = POP_WORDS[Math.floor(Math.random() * POP_WORDS.length)];
      t.style.left = x + "px";
      t.style.top = y + "px";
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 700);
    }

    function centerOf(el) {
      const r = el.getBoundingClientRect();
      return {
        x: r.left + r.width / 2,
        y: r.top + r.height / 2
      };
    }

    function popBubble(bubble, x = null, y = null) {
      if (bubble.dataset.popped === "true") return;

      bubble.dataset.popped = "true";
      bubble.classList.add("popped");

      const pt = x == null || y == null ? centerOf(bubble) : { x, y };

      sparkle(pt.x, pt.y);
      if (Math.random() > 0.4) popText(pt.x, pt.y);
      playPopSound(Math.floor(Math.random() * 4));
    }

    function resetBubbles() {
      bubbles.forEach((bubble, i) => {
        setTimeout(() => {
          bubble.dataset.popped = "false";
          bubble.classList.remove("popped");
          bubble.classList.remove("reinflating");
          void bubble.offsetWidth;
          bubble.classList.add("reinflating");
        }, i * 8);
      });
    }

    function randomPop() {
      const alive = bubbles.filter(b => b.dataset.popped === "false");
      const count = Math.min(alive.length, 18);

      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const remaining = bubbles.filter(b => b.dataset.popped === "false");
          if (!remaining.length) return;
          const bubble = remaining[Math.floor(Math.random() * remaining.length)];
          const pt = centerOf(bubble);
          popBubble(bubble, pt.x, pt.y);
        }, i * 65);
      }
    }

    window.addEventListener("pointerdown", () => {
      dragging = true;
      createAudio();
    });

    window.addEventListener("pointerup", () => {
      dragging = false;
    });

    window.addEventListener("pointercancel", () => {
      dragging = false;
    });

    resetBtn.addEventListener("click", resetBubbles);
    randomBtn.addEventListener("click", randomPop);

    soundBtn.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      soundBtn.textContent = soundEnabled ? "Sound: On" : "Sound: Off";
      if (soundEnabled) createAudio();
    });

    window.addEventListener("resize", () => {
      clearTimeout(window.__bubbleResizeTimer);
      window.__bubbleResizeTimer = setTimeout(fillWrap, 120);
    });

    fillWrap();
  </script>
</body>
</html>
