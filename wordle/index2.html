<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="لعبة كلمات عربية مع لوحة احتمالات تساعدك على تتبع الحروف الممكنة."
    />
    <title>Wordle</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="index2">
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <h1 id="app-title">Wordle</h1>
        </div>
        <div class="hero-actions">
          <button id="settings-button" class="ghost-button icon-button" type="button" aria-label="الإعدادات" title="الإعدادات">
            <span class="settings-glyph" aria-hidden="true">⚙</span>
          </button>
          <button id="share-button" class="ghost-button icon-button" type="button" aria-label="مشاركة على واتساب" title="مشاركة على واتساب">
            <svg class="share-glyph" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M14 5l5 5-5 5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M19 10H10.5A4.5 4.5 0 0 0 6 14.5V19" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <button id="reset-button" class="ghost-button icon-button" type="button" aria-label="جولة جديدة" title="جولة جديدة">
            ↻
          </button>
          <button id="hint-button" class="ghost-button" type="button">
            تلميح (2)
          </button>
        </div>
      </header>

      <div class="legend-wrap">
        <div class="legend" aria-label="شرح الألوان">
          <span class="legend-item correct">صحيح</span>
          <span class="legend-item present">موجود</span>
          <span class="legend-item absent">غير موجود</span>
        </div>
      </div>

      <main class="game-layout">
        <section class="panel board-panel" aria-label="لوحة اللعبة">
          <p id="hint-display" class="hint-display"></p>
          <div id="result-banner" class="result-banner" role="status" aria-live="polite"></div>
          <div id="board" class="board" aria-live="polite"></div>
          <div id="toast" class="toast" role="status" aria-live="polite"></div>
        </section>
        <section class="keyboard-panel panel" aria-label="لوحة المفاتيح">
          <div id="keyboard" class="keyboard"></div>
        </section>
      </main>

      <section id="possible-panel" class="panel possible-panel" aria-label="الاحتمالات المتبقية">
        <div class="possible-header">
          <div>
            <h2>الاحتمالات المتبقية</h2>
          </div>
        </div>
        <div id="possible-positions" class="possible-positions"></div>
      </section>

      <p class="footer-note">
        أ / إ / آ / ٱ تُقارن مثل ا
        <br />
        ؤ تُقارن مثل و
        <br />
        ى / ئ تُقارن مثل ي
        <br />
        ة تبقى ة ولا تتحول إلى ه
      </p>
    </div>

    <div id="settings-modal" class="settings-modal" hidden>
      <div id="settings-backdrop" class="settings-backdrop"></div>
      <section class="settings-card panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <header class="settings-head">
          <h2 id="settings-title">الإعدادات</h2>
          <button id="settings-close" class="ghost-button icon-button" type="button" aria-label="إغلاق">✕</button>
        </header>
        <label class="settings-row" for="infinite-tries-toggle">
          <span>محاولات لا نهائية</span>
          <input id="infinite-tries-toggle" type="checkbox" />
        </label>
        <label class="settings-row" for="dark-mode-toggle">
          <span>الوضع الداكن</span>
          <input id="dark-mode-toggle" type="checkbox" />
        </label>
      </section>
    </div>

    <script src="./word-data.js"></script>
    <script src="./app.js"></script>

    <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>
  </body>
</html>
