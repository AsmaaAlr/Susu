<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="واجهة بديلة فاتحة وأنيقة للعبة تابو العربية." />
    <title>تابو - واجهة جديدة</title>
    <style>
      :root {
        --page-bg: #fff8f0;
        --page-accent: #ffe4cf;
        --surface: rgba(255, 255, 255, 0.92);
        --line: rgba(148, 102, 66, 0.14);
        --text: #2f241d;
        --muted: #746256;
        --shadow: 0 18px 40px rgba(176, 125, 86, 0.16);
        --team1-a: #ff8a65;
        --team1-b: #ef6c4f;
        --team1-text: #fffaf7;
        --team2-a: #59c6b4;
        --team2-b: #2fa08d;
        --team2-text: #f5fffc;
        --ok-a: #59c96b;
        --ok-b: #2f9e44;
        --skip-a: #ffcf66;
        --skip-b: #eca728;
        --skip-text: #4a3307;
        --bad-a: #ff8f8f;
        --bad-b: #df5d5d;
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        color: var(--text);
        font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 138, 101, 0.14), transparent 22%),
          radial-gradient(circle at top right, rgba(89, 198, 180, 0.16), transparent 24%),
          linear-gradient(180deg, #fffdf8, var(--page-bg) 48%, var(--page-accent));
      }

      .page-shell {
        width: min(1040px, calc(100% - 20px));
        margin: 0 auto;
        padding: 10px 0 24px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: #c56d46;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .brand-block h1 { margin: 0; font-size: clamp(2.2rem, 7vw, 4.5rem); line-height: 0.95; }
      .topbar-actions { display: flex; align-items: center; gap: 8px; position: relative; }

      .icon-button {
        width: 46px;
        min-width: 46px;
        height: 46px;
        padding: 0;
        border-radius: 16px;
        background: #fff;
        border: 1px solid var(--line);
        color: var(--text);
        font-size: 1.25rem;
        font-weight: 900;
        cursor: pointer;
      }

      .settings-popover {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        width: min(320px, calc(100vw - 24px));
        border-radius: 20px;
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 12px;
        z-index: 20;
        display: grid;
        gap: 10px;
      }
      .settings-popover[hidden] { display: none !important; }
      .settings-popover h2 { margin: 0; font-size: 1rem; }
      .popover-field { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; }
      .popover-field span { color: var(--muted); font-size: 0.9rem; font-weight: 700; }
      .popover-field input {
        width: 88px;
        min-height: 38px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        text-align: center;
        font-weight: 900;
      }

      .save-settings-button {
        min-height: 40px;
        border-radius: 12px;
        border: 0;
        background: linear-gradient(145deg, #ff9a74, #ea6a47);
        color: #fff;
        font-weight: 900;
        cursor: pointer;
      }

      .app { display: grid; gap: 10px; }
      .panel, .collapsible {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 30px;
        box-shadow: var(--shadow);
      }
      .board-panel { padding: 12px; display: grid; gap: 10px; }

      .scoreboard { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .team-card {
        min-height: 78px;
        border-radius: 18px;
        padding: 8px 10px;
        display: grid;
        gap: 4px;
        border: 1px solid transparent;
      }
      .team-card.team-1 { background: linear-gradient(145deg, var(--team1-a), var(--team1-b)); color: var(--team1-text); }
      .team-card.team-2 { background: linear-gradient(145deg, var(--team2-a), var(--team2-b)); color: var(--team2-text); }
      .team-card.active { box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.72); }
      .team-name { font-size: 0.85rem; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .team-score { font-size: 1.4rem; font-weight: 900; line-height: 1; }
      .team-skips { font-size: 0.7rem; opacity: 0.94; font-weight: 800; }

      .card-shell {
        border-radius: 28px;
        min-height: 300px;
        padding: 18px;
        position: relative;
        overflow: hidden;
      }
      .card-shell.team-1 { background: linear-gradient(145deg, var(--team1-a), var(--team1-b)); color: var(--team1-text); }
      .card-shell.team-2 { background: linear-gradient(145deg, var(--team2-a), var(--team2-b)); color: var(--team2-text); }

      .timer-chip {
        position: absolute;
        top: 10px;
        left: 10px;
        width: 58px;
        height: 58px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.32);
        display: grid;
        place-items: center;
      }
      .timer-chip strong { font-size: 1.1rem; font-weight: 900; }

      .card-title {
        margin: 16px 0 12px;
        text-align: center;
        font-size: clamp(2.15rem, 8vw, 4rem);
        line-height: 0.96;
      }
      .forbidden-label { margin: 0 0 10px; text-align: center; font-size: 0.95rem; font-weight: 900; opacity: 0.95; }
      .forbidden-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
      .forbidden-pill {
        border-radius: 14px;
        padding: 10px;
        font-size: 0.98rem;
        font-weight: 900;
        text-align: center;
      }
      .card-shell.team-1 .forbidden-pill {
        background: rgba(255, 250, 247, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fffdfa;
      }
      .card-shell.team-2 .forbidden-pill {
        background: rgba(244, 255, 252, 0.24);
        border: 1px solid rgba(255, 255, 255, 0.22);
        color: #f5fffd;
      }

      .actions { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      button, summary, input { font: inherit; }
      .action-button {
        min-height: 52px;
        border: 0;
        border-radius: 15px;
        padding: 8px;
        font-weight: 900;
        cursor: pointer;
      }
      .success-button { background: linear-gradient(145deg, var(--ok-a), var(--ok-b)); color: #fbfffc; }
      .danger-button { background: linear-gradient(145deg, var(--bad-a), var(--bad-b)); color: #fff8f8; }
      .skip-button { background: linear-gradient(145deg, var(--skip-a), var(--skip-b)); color: var(--skip-text); }
      .action-button:disabled { opacity: 0.45; cursor: not-allowed; }

      .collapsible { overflow: hidden; }
      .collapsible summary {
        list-style: none;
        cursor: pointer;
        padding: 12px 16px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .collapsible summary::-webkit-details-marker { display: none; }
      .summary-title { display: inline-flex; align-items: center; gap: 8px; }
      .summary-icon {
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 180ms ease;
      }
      .summary-icon::before {
        content: "";
        width: 7px;
        height: 7px;
        border-left: 2px solid #c56d46;
        border-bottom: 2px solid #c56d46;
        transform: rotate(-45deg) translateY(-1px);
      }
      .collapsible[open] .summary-icon { transform: rotate(180deg); }
      .collapsible-body { padding: 0 16px 14px; }
      .collapsible-body ul { margin: 0; padding: 0 16px 0 0; display: grid; gap: 8px; }
      .collapsible-body li { color: var(--muted); line-height: 1.55; font-size: 0.92rem; }

      button:focus-visible, summary:focus-visible, input:focus-visible {
        outline: 3px solid rgba(93, 176, 160, 0.42);
        outline-offset: 2px;
      }

      @media (max-width: 920px) {
        .page-shell { width: calc(100% - 14px); padding-top: 8px; }
        .brand-block h1 { font-size: clamp(1.85rem, 10vw, 2.8rem); }
        .icon-button { width: 42px; min-width: 42px; height: 42px; border-radius: 14px; }
        .board-panel { padding: 10px; }
        .card-shell { padding: 14px; min-height: 270px; }
        .forbidden-pill { font-size: 0.9rem; padding: 9px; }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Family Game Night</p>
          <h1>تابو</h1>
        </div>
        <div class="topbar-actions">
          <button id="restart-button" class="icon-button" type="button" aria-label="إعادة اللعبة" title="إعادة اللعبة">↻</button>
          <button id="settings-button" class="icon-button" type="button" aria-label="الإعدادات" title="الإعدادات">⚙</button>
          <div id="settings-panel" class="settings-popover" hidden>
            <h2>الإعدادات</h2>
            <label class="popover-field">
              <span>عدد الكلمات لكل دور</span>
              <input id="cards-per-round-input" type="number" min="1" max="20" value="5" />
            </label>
            <label class="popover-field">
              <span>مرات التخطي لكل فريق</span>
              <input id="skip-limit-input" type="number" min="0" max="10" value="3" />
            </label>
            <label class="popover-field">
              <span>وقت الدور (ثانية)</span>
              <input id="round-seconds-input" type="number" min="20" max="180" value="60" />
            </label>
            <button id="save-settings-button" class="save-settings-button" type="button">حفظ</button>
          </div>
        </div>
      </header>

      <main id="app" class="app" aria-live="polite"></main>
    </div>

    <script type="module">
      const defaultConfig = {
        roundSeconds: 60,
        skipLimit: 3,
        questionsPerRound: 5,
      };

      let tabooConfig = { ...defaultConfig };
      let tabooDeck = [];

      const appElement = document.querySelector("#app");
      const restartButton = document.querySelector("#restart-button");
      const settingsButton = document.querySelector("#settings-button");
      const settingsPanel = document.querySelector("#settings-panel");
      const cardsPerRoundInput = document.querySelector("#cards-per-round-input");
      const skipLimitInput = document.querySelector("#skip-limit-input");
      const roundSecondsInput = document.querySelector("#round-seconds-input");
      const saveSettingsButton = document.querySelector("#save-settings-button");

      const state = {
        deck: [],
        deckIndex: 0,
        currentCard: null,
        activeTeam: 0,
        cardsUsedThisTurn: 0,
        timeLeft: 60,
        timerHandle: null,
        rulesOpen: false,
        settings: {
          cardsPerRound: 5,
          skipLimit: 3,
          roundSeconds: 60,
        },
        teams: [
          { name: "الفريق البنفسجي", score: 0, skipsUsed: 0 },
          { name: "الفريق البرتقالي", score: 0, skipsUsed: 0 },
        ],
        status: "loading",
      };

      async function loadDataModule() {
        const candidatePaths = ["./data.js", "../data.js", "../../data.js", "/data.js"];
        for (const candidate of candidatePaths) {
          try {
            const moduleData = await import(candidate);
            if (Array.isArray(moduleData?.tabooDeck)) {
              tabooDeck = moduleData.tabooDeck;
              tabooConfig = { ...defaultConfig, ...(moduleData.tabooConfig || {}) };
              return;
            }
          } catch (error) {
            // Try next path
          }
        }
        throw new Error("تعذر تحميل data.js. تأكد من رفع data.js مع game2.html");
      }

      function createElement(tag, className, text) {
        const element = document.createElement(tag);
        if (className) element.className = className;
        if (typeof text === "string") element.textContent = text;
        return element;
      }

      function shuffle(items) {
        const next = [...items];
        for (let index = next.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [next[index], next[swapIndex]] = [next[swapIndex], next[index]];
        }
        return next;
      }

      function sanitizeDeck(rawDeck) {
        return rawDeck
          .map((card) => ({
            word: String(card.word ?? "").trim(),
            forbiddenWords: Array.isArray(card.forbiddenWords)
              ? card.forbiddenWords.map((item) => String(item ?? "").trim()).filter(Boolean).slice(0, 5)
              : [],
          }))
          .filter((card) => card.word.length > 0 && card.forbiddenWords.length > 0);
      }

      function resetDeck() {
        state.deck = shuffle(sanitizeDeck(tabooDeck));
        state.deckIndex = 0;
      }

      function nextCard() {
        if (!state.deck.length) {
          state.currentCard = null;
          return;
        }
        if (state.deckIndex >= state.deck.length) resetDeck();
        state.currentCard = state.deck[state.deckIndex] ?? null;
        state.deckIndex += 1;
      }

      function updateTimer() {
        state.timeLeft -= 1;
        if (state.timeLeft <= 0) {
          state.timeLeft = 0;
          endTurn();
          return;
        }
        render();
      }

      function startTurn() {
        state.cardsUsedThisTurn = 0;
        state.timeLeft = state.settings.roundSeconds;
        nextCard();
        clearInterval(state.timerHandle);
        state.timerHandle = window.setInterval(updateTimer, 1000);
        render();
      }

      function endTurn() {
        clearInterval(state.timerHandle);
        state.timerHandle = null;
        state.activeTeam = state.activeTeam === 0 ? 1 : 0;
        startTurn();
      }

      function consumeCard() {
        state.cardsUsedThisTurn += 1;
        if (state.cardsUsedThisTurn >= state.settings.cardsPerRound) {
          endTurn();
          return;
        }
        nextCard();
        render();
      }

      function onCorrect() {
        state.teams[state.activeTeam].score += 1;
        consumeCard();
      }

      function onWrong() {
        consumeCard();
      }

      function onSkip() {
        const team = state.teams[state.activeTeam];
        if (team.skipsUsed >= state.settings.skipLimit) return;
        team.skipsUsed += 1;
        consumeCard();
      }

      function resetGame() {
        state.teams.forEach((team) => {
          team.score = 0;
          team.skipsUsed = 0;
        });
        state.activeTeam = 0;
        resetDeck();
        startTurn();
      }

      function applySettings() {
        state.settings.cardsPerRound = Math.max(1, Math.min(20, Number.parseInt(cardsPerRoundInput.value, 10) || 5));
        state.settings.skipLimit = Math.max(0, Math.min(10, Number.parseInt(skipLimitInput.value, 10) || 3));
        state.settings.roundSeconds = Math.max(20, Math.min(180, Number.parseInt(roundSecondsInput.value, 10) || 60));
        cardsPerRoundInput.value = String(state.settings.cardsPerRound);
        skipLimitInput.value = String(state.settings.skipLimit);
        roundSecondsInput.value = String(state.settings.roundSeconds);
        state.timeLeft = Math.min(state.timeLeft, state.settings.roundSeconds);
        settingsPanel.hidden = true;
        render();
      }

      function buildTeamCard(team, teamIndex) {
        const card = createElement("div", `team-card team-${teamIndex + 1}`);
        if (teamIndex === state.activeTeam) card.classList.add("active");
        card.append(
          createElement("div", "team-name", team.name),
          createElement("div", "team-score", String(team.score)),
          createElement("div", "team-skips", `تخطي ${team.skipsUsed}/${state.settings.skipLimit}`)
        );
        return card;
      }

      function buildCardShell() {
        const shell = createElement("section", `card-shell team-${state.activeTeam + 1}`);
        const timer = createElement("div", "timer-chip");
        timer.append(createElement("strong", "", String(state.timeLeft)));
        shell.append(timer);
        shell.append(createElement("h2", "card-title", state.currentCard?.word ?? "..."));
        shell.append(createElement("p", "forbidden-label", "كلمات ممنوعة"));
        const forbiddenGrid = createElement("div", "forbidden-grid");
        const words = state.currentCard?.forbiddenWords ?? [];
        words.forEach((word) => forbiddenGrid.append(createElement("div", "forbidden-pill", word)));
        if (!words.length) forbiddenGrid.append(createElement("div", "forbidden-pill", "لا توجد بيانات"));
        shell.append(forbiddenGrid);
        return shell;
      }

      function buildActions() {
        const actions = createElement("div", "actions");
        const correctButton = createElement("button", "action-button success-button", "صح");
        const wrongButton = createElement("button", "action-button danger-button", "خطأ");
        const skipButton = createElement("button", "action-button skip-button", "تخطي");
        correctButton.type = "button";
        wrongButton.type = "button";
        skipButton.type = "button";
        skipButton.disabled = state.teams[state.activeTeam].skipsUsed >= state.settings.skipLimit;
        correctButton.addEventListener("click", onCorrect);
        wrongButton.addEventListener("click", onWrong);
        skipButton.addEventListener("click", onSkip);
        actions.append(correctButton, wrongButton, skipButton);
        return actions;
      }

      function buildRules() {
        const rules = document.createElement("details");
        rules.className = "collapsible";
        rules.open = state.rulesOpen;
        const summary = document.createElement("summary");
        const titleWrap = createElement("span", "summary-title");
        titleWrap.append(createElement("span", "", "📋"), createElement("span", "", "قواعد اللعبة"));
        summary.append(titleWrap, createElement("span", "summary-icon"));
        const body = createElement("div", "collapsible-body");
        const list = document.createElement("ul");
        [
          "طريقة اللعب:",
          "اشرح الكلمة من دون قول الكلمات الممنوعة.",
          "التحكم من جهاز واحد والباقي يشاركون بالتخمين.",
          `لكل فريق ${state.settings.skipLimit} مرات تخطي في اللعبة.`,
          `ينتهي الدور بعد ${state.settings.cardsPerRound} كلمات أو انتهاء الوقت.`,
          "الهدف: جمع أكبر عدد من النقاط.",
        ].forEach((rule) => list.append(createElement("li", "", rule)));
        body.append(list);
        rules.append(summary, body);
        rules.addEventListener("toggle", () => {
          state.rulesOpen = rules.open;
        });
        return rules;
      }

      function renderLoading() {
        const panel = createElement("section", "panel board-panel");
        panel.append(createElement("p", "", "جاري تجهيز اللعبة..."));
        appElement.append(panel);
      }

      function renderBoard() {
        const board = createElement("section", "panel board-panel");
        const scoreboard = createElement("div", "scoreboard");
        state.teams.forEach((team, teamIndex) => scoreboard.append(buildTeamCard(team, teamIndex)));
        board.append(scoreboard, buildCardShell(), buildActions());
        appElement.append(board, buildRules());
      }

      function render() {
        appElement.replaceChildren();
        cardsPerRoundInput.value = String(state.settings.cardsPerRound);
        skipLimitInput.value = String(state.settings.skipLimit);
        roundSecondsInput.value = String(state.settings.roundSeconds);
        if (state.status === "loading") {
          renderLoading();
          return;
        }
        renderBoard();
      }

      settingsButton.addEventListener("click", () => {
        settingsPanel.hidden = !settingsPanel.hidden;
      });

      saveSettingsButton.addEventListener("click", applySettings);
      restartButton.addEventListener("click", resetGame);

      document.addEventListener("click", (event) => {
        const target = event.target;
        if (!settingsPanel.hidden && !settingsPanel.contains(target) && target !== settingsButton) {
          settingsPanel.hidden = true;
        }
      });

      function boot() {
        loadDataModule()
          .then(() => {
            state.settings.cardsPerRound = Number.parseInt(tabooConfig.questionsPerRound || 5, 10) || 5;
            state.settings.skipLimit = Number.parseInt(tabooConfig.skipLimit || 3, 10) || 3;
            state.settings.roundSeconds = Number.parseInt(tabooConfig.roundSeconds || 60, 10) || 60;
            state.timeLeft = state.settings.roundSeconds;
            resetDeck();
            state.status = state.deck.length ? "ready" : "loading";
            startTurn();
          })
          .catch(() => {
            appElement.replaceChildren();
            const panel = createElement("section", "panel board-panel");
            panel.append(createElement("p", "", "تعذر تحميل بيانات اللعبة. ارفع data.js بجانب game2.html"));
            appElement.append(panel);
          });
      }

      boot();
    </script>
  </body>
</html>
