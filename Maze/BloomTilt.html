<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Flowers Maze</title>
<style>
  :root{
    --cream:#fff8ea;
    --pink:#ff77b7;
    --rose:#ff4f9e;
    --leaf:#5fad62;
    --deep:#25713f;
    --mint:#c9f7d7;
    --gold:#ffd25e;
    --ink:#294136;
    --glass:rgba(255,255,255,.72);
    --shadow:0 18px 55px rgba(61,90,64,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 14% 18%, rgba(255,153,202,.45), transparent 28%),
      radial-gradient(circle at 90% 20%, rgba(255,223,126,.50), transparent 30%),
      radial-gradient(circle at 70% 92%, rgba(156,235,175,.55), transparent 34%),
      linear-gradient(135deg,#fff7e8,#edfbe9 52%,#ffeaf4);
    font-family: ui-rounded, "SF Pro Rounded", "Trebuchet MS", system-ui, sans-serif;
    color:var(--ink);
    touch-action:none;
  }

  #wrap{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:grid;
    place-items:center;
    padding: max(10px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
    overflow:hidden;
  }

  #phoneFrame{
    position:relative;
    width:min(100%, 540px);
    height:min(100%, 980px);
    max-width:100%;
    max-height:100%;
    border-radius:clamp(20px, 7vw, 34px);
    overflow:hidden;
    background:rgba(255,255,255,.46);
    box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,.75);
    isolation:isolate;
  }

  canvas{
    display:block;
    width:100%;
    height:100%;
    image-rendering:auto;
  }


  .muteBtn{
    position:absolute;
    z-index:7;
    top:12px;
    left:12px;
    width:38px;
    height:38px;
    border:0;
    border-radius:999px;
    background:rgba(255,255,255,.72);
    backdrop-filter: blur(12px);
    box-shadow:0 9px 24px rgba(61,90,64,.14), inset 0 0 0 1px rgba(255,255,255,.7);
    font-size:17px;
    display:grid;
    place-items:center;
    cursor:pointer;
    pointer-events:auto;
  }
  .muteBtn:active{
    transform:translateY(1px) scale(.97);
  }

  .hud{
    position:absolute;
    inset:12px 12px auto 58px;
    display:flex;
    gap:8px;
    align-items:center;
    justify-content:space-between;
    z-index:5;
    pointer-events:none;
  }

  .pill{
    pointer-events:auto;
    display:flex;
    align-items:center;
    gap:7px;
    min-height:34px;
    padding:7px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.68);
    backdrop-filter: blur(12px);
    box-shadow:0 9px 24px rgba(61,90,64,.14), inset 0 0 0 1px rgba(255,255,255,.7);
    font-weight:800;
    font-size:12px;
    white-space:nowrap;
  }

  .pill small{
    opacity:.72;
    font-weight:900;
    letter-spacing:.02em;
  }

  .btn{
    border:0;
    outline:0;
    border-radius:999px;
    padding:10px 14px;
    background:linear-gradient(135deg,#ff75b8,#ff4d96);
    color:#fff;
    font-weight:950;
    box-shadow:0 12px 25px rgba(255,79,158,.3);
    cursor:pointer;
    touch-action:manipulation;
  }
  .btn:active{transform:translateY(1px) scale(.98)}
  .btn.ghost{
    background:rgba(255,255,255,.72);
    color:var(--ink);
    box-shadow:0 9px 22px rgba(61,90,64,.12);
  }
  .btn.gold{
    background:linear-gradient(135deg,#ffe48c,#ffbb38);
    color:#64400b;
    box-shadow:0 12px 25px rgba(244,170,36,.24);
  }

  .panel{
    position:absolute;
    z-index:10;
    inset:0;
    display:grid;
    place-items:center;
    padding:clamp(10px, 4vw, 20px);
    overflow:hidden;
    background:
      radial-gradient(circle at 20% 16%, rgba(255,153,202,.45), transparent 25%),
      radial-gradient(circle at 80% 74%, rgba(255,220,116,.42), transparent 25%),
      rgba(255,252,242,.18);
    backdrop-filter: blur(10px);
  }

  .card{
    width:min(100%, 440px);
    max-width:440px;
    border-radius:30px;
    padding:22px;
    background:rgba(255,255,255,.78);
    box-shadow:0 24px 70px rgba(61,90,64,.24), inset 0 0 0 1px rgba(255,255,255,.75);
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .card:before{
    content:"";
    position:absolute;
    width:190px;height:190px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,118,181,.28), transparent 68%);
    top:-70px;left:-60px;
  }
  .card:after{
    content:"";
    position:absolute;
    width:210px;height:210px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(144,227,156,.38), transparent 70%);
    right:-75px;bottom:-80px;
  }
  .card > *{position:relative;z-index:1}

  h1{
    margin:4px 0 8px;
    font-size:clamp(32px, 8vw, 52px);
    line-height:.92;
    letter-spacing:-.06em;
  }

  .titleRow{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:6px;
  }
  .titleRow h1{
    margin:0;
  }
  .titleFlower{
    width:20px;
    height:20px;
    flex:0 0 20px;
    background:
      radial-gradient(circle at 50% 50%, #ffd55c 0 24%, transparent 25%),
      radial-gradient(circle at 30% 30%, #ff75b7 0 21%, transparent 22%),
      radial-gradient(circle at 70% 30%, #ff75b7 0 21%, transparent 22%),
      radial-gradient(circle at 30% 70%, #ff75b7 0 21%, transparent 22%),
      radial-gradient(circle at 70% 70%, #ff75b7 0 21%, transparent 22%);
    filter: drop-shadow(0 4px 8px rgba(255,79,158,.18));
  }

  .sub{
    margin:0 auto 16px;
    max-width:34ch;
    color:#52665c;
    font-weight:650;
    line-height:1.35;
  }

  .duckHero{
    width:122px;
    height:92px;
    margin:8px auto 12px;
    position:relative;
    filter:drop-shadow(0 12px 20px rgba(122,92,25,.20));
  }
  .duckHero .body{
    position:absolute;
    left:18px;bottom:8px;
    width:82px;height:58px;
    background:linear-gradient(#ffe681,#ffc845);
    border-radius:55% 48% 45% 48%;
  }
  .duckHero .head{
    position:absolute;
    left:58px;top:10px;
    width:48px;height:43px;
    background:linear-gradient(#ffe98e,#ffd34f);
    border-radius:50%;
  }
  .duckHero .bill{
    position:absolute;
    left:95px;top:31px;
    width:28px;height:15px;
    background:#ff9d37;
    border-radius:60% 50% 50% 60%;
  }
  .duckHero .eye{
    position:absolute;
    left:87px;top:25px;
    width:8px;height:8px;
    background:#2b2b2b;
    border-radius:50%;
    box-shadow:2px -2px 0 0 rgba(255,255,255,.85) inset;
  }
  .duckHero .wing{
    position:absolute;
    left:37px;top:43px;
    width:38px;height:26px;
    background:rgba(255,185,48,.5);
    border-radius:50%;
    transform:rotate(-16deg);
  }
  .duckHero .flower{
    position:absolute;
    left:54px;top:2px;
    width:22px;height:22px;
    background:
      radial-gradient(circle at 50% 50%, #ffd55c 0 24%, transparent 25%),
      radial-gradient(circle at 30% 30%, #ff75b7 0 21%, transparent 22%),
      radial-gradient(circle at 70% 30%, #ff75b7 0 21%, transparent 22%),
      radial-gradient(circle at 30% 70%, #ff75b7 0 21%, transparent 22%),
      radial-gradient(circle at 70% 70%, #ff75b7 0 21%, transparent 22%);
  }

  .row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:14px;
    max-width:100%;
  }
  .row .btn{
    max-width:100%;
  }
  h1,.sub,.tip{
    overflow-wrap:anywhere;
  }

  .tips{
    margin:16px auto 0;
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
    text-align:left;
    max-width:330px;
  }
  .tip{
    background:rgba(255,248,234,.74);
    border-radius:18px;
    padding:10px;
    font-size:12px;
    font-weight:800;
    color:#506459;
  }

  .bottomControls{
    position:absolute;
    z-index:6;
    left:12px;
    right:12px;
    bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:end;
    gap:10px;
    pointer-events:none;
  }

  .speedBox{
    width:178px;
    pointer-events:auto;
    border-radius:22px;
    padding:10px;
    background:rgba(255,255,255,.68);
    backdrop-filter: blur(12px);
    box-shadow:0 12px 28px rgba(61,90,64,.14), inset 0 0 0 1px rgba(255,255,255,.7);
  }
  .speedBox label{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    font-weight:950;
    margin-bottom:6px;
  }
  input[type=range]{
    width:100%;
    accent-color:#ff4f9e;
  }

  #joy{
    width:118px;
    height:118px;
    border-radius:50%;
    background:rgba(255,255,255,.54);
    box-shadow:0 12px 28px rgba(61,90,64,.14), inset 0 0 0 1px rgba(255,255,255,.72);
    pointer-events:auto;
    position:relative;
    touch-action:none;
    display:none;
  }
  #joy.show{display:block}
  #knob{
    width:46px;
    height:46px;
    border-radius:50%;
    background:linear-gradient(135deg,#ff78bb,#ff4e9a);
    position:absolute;
    left:36px;top:36px;
    box-shadow:0 10px 22px rgba(255,79,158,.27);
  }

  .toast{
    position:absolute;
    z-index:8;
    left:50%;
    bottom:156px;
    transform:translateX(-50%) translateY(20px);
    padding:10px 13px;
    border-radius:999px;
    background:rgba(41,65,54,.84);
    color:white;
    font-weight:850;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:.28s ease;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }


  .panel.winOverlay{
    background:transparent;
    backdrop-filter:none;
    pointer-events:none;
  }
  .panel.winOverlay .card{
    pointer-events:auto;
    background:rgba(255,255,255,.86);
  }

  .hidden{display:none!important}


  @media (max-width:380px){
  
  .muteBtn{
    position:absolute;
    z-index:7;
    top:12px;
    left:12px;
    width:38px;
    height:38px;
    border:0;
    border-radius:999px;
    background:rgba(255,255,255,.72);
    backdrop-filter: blur(12px);
    box-shadow:0 9px 24px rgba(61,90,64,.14), inset 0 0 0 1px rgba(255,255,255,.7);
    font-size:17px;
    display:grid;
    place-items:center;
    cursor:pointer;
    pointer-events:auto;
  }
  .muteBtn:active{
    transform:translateY(1px) scale(.97);
  }

  .hud{
      inset:8px 8px auto 8px;
      gap:5px;
    }
    .pill{
      min-height:30px;
      padding:6px 8px;
      font-size:11px;
      gap:4px;
    }
    .btn{
      padding:8px 10px;
      font-size:12px;
    }
    #calibrateBtn{
      max-width:84px;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .bottomControls{
      left:8px;
      right:8px;
      bottom:8px;
    }
    .speedBox{
      width:138px;
      border-radius:18px;
      padding:8px;
    }
    .speedBox label{
      font-size:10px;
    }
    #joy{
      width:96px;
      height:96px;
    }
    #knob{
      width:38px;
      height:38px;
      left:29px;
      top:29px;
    }
    .toast{
      bottom:132px;
      font-size:12px;
      max-width:92%;
      white-space:normal;
      text-align:center;
    }
    .card{
      width:100%;
      max-width:342px;
      padding:16px;
      border-radius:24px;
    }
    h1{
      font-size:34px;
    }
    .sub{
      font-size:13px;
    }
  }

  @media (max-width:330px){
    .panel{
      padding:8px;
    }
    .card{
      max-width:100%;
      padding:14px;
    }
    .row{
      gap:7px;
    }
    .muteBtn{
      width:32px;
      height:32px;
      font-size:14px;
    }
    .pill{
      font-size:10px;
      padding:5px 6px;
    }
    #calibrateBtn{
      max-width:72px;
    }
    .speedBox{
      width:126px;
    }
    #joy{
      width:88px;
      height:88px;
    }
    #knob{
      width:34px;
      height:34px;
      left:27px;
      top:27px;
    }
  }

  @media (max-height:700px){
    .tips{display:none}
    .duckHero{transform:scale(.88); margin:0 auto 4px}
    .card{padding:18px}
  }

  @media (min-width:700px){
    #phoneFrame{height:min(100%, 940px)}
  }
</style>
</head>

        "1010001000101",
        "1010011011101",
        "1000001000001",

      ]
    },
    {
      name: "Golden Garden",
      map: [
        "111111111111111",
        "1S0000100000001",
        "101110110010101",
        "100010000010001",
        "101011111110111",
        "101000000000101",
        "101111011111101",
        "100010000000001",
        "111010111100101",
        "100010100000001",
        "101111101101001",
        "100000001000001",
        "110110111011111",
        "100000100000001",
        "111010101111101",
        "100010101000001",
        "101111101011101",
        "100000101010001",
        "100110101000111",
        "100000100000001",
        "111010110110101",
        "100010000000001",
        "101011101110101",
        "101000100000001",
        "101010100010101",
        "1000000010000E1",
        "111111111111111"
      ]
    }
  ];

  let level, map, rows, cols;
  let player = {x:0,y:0,r:10,vx:0,vy:0,dir:0,blush:0};
  let flowers = [];
  let exit = {x:0,y:0,w:0,h:0};

  function showToast(text, ms=1500){
    toast.textContent = text;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove("show"), ms);
  }

  function resize(){
    const box = canvas.parentElement.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2.5);
    W = Math.max(1, Math.floor(box.width));
    H = Math.max(1, Math.floor(box.height));
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
    fitMaze();
    initButterflies(true);
  }

  function fitMaze(){
    if(!map) return;

    // Thin-phone safe sizing: never let the maze become wider than the canvas.
    const isThin = W < 380;
    const safeTop = isThin ? 86 : 94;
    const safeBottom = isThin ? 112 : 126;
    const sidePad = isThin ? 10 : 22;

    const availableW = Math.max(180, W - sidePad);
    const availableH = Math.max(260, H - safeTop - safeBottom);

    const rawCell = Math.min(availableW / cols, availableH / rows);
    const maxCell = isThin ? 34 : 42;
    const minCell = isThin ? 12 : 15;

    cell = Math.floor(clamp(rawCell, minCell, maxCell));

    // Final safety pass: if width is still tight, shrink by exact width.
    if(cell * cols > W - 6){
      cell = Math.max(10, Math.floor((W - 6) / cols));
    }

    const mazeW = cell * cols;
    const mazeH = cell * rows;

    offsetX = Math.floor((W - mazeW) / 2);

    // True screen-center first, then clamp only if it would collide with UI.
    const centeredY = Math.floor((H - mazeH) / 2) - 12;
    const minY = safeTop;
    const maxY = H - safeBottom - mazeH;
    offsetY = Math.floor(clamp(centeredY, minY, Math.max(minY, maxY)));

    player.r = Math.max(isThin ? 6 : 8, cell * 0.29);
    if(level) placeEntities(true);
  }

  function loadLevel(idx){
    levelIndex = (idx + levels.length) % levels.length;
    level = levels[levelIndex];
    map = level.map.map(r => r.split(""));
    rows = map.length;
    cols = map[0].length;
    flowers = [];
    particles = [];
    confetti = [];
    fitMaze();
    startedAt = performance.now();
    elapsed = 0;
    gameState = "playing";
    perfectMessage = "";
  }

  function hashRand(n){
    const x = Math.sin(n * 999.123 + 7.13) * 10000;
    return x - Math.floor(x);
  }

  function placeEntities(keepCollected=false){
    const oldCollected = flowers.filter(f => f.collected).length;
    flowers = [];
    let seed = levelIndex * 1000 + 33;
    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        const ch = map[y][x];
        if(ch === "S"){
          player.x = offsetX + x * cell + cell / 2;
          player.y = offsetY + y * cell + cell / 2;
          map[y][x] = "0";
        }
        if(ch === "E"){
          exit.x = offsetX + x * cell + cell * .12;
          exit.y = offsetY + y * cell + cell * .12;
          exit.w = cell * .76;
          exit.h = cell * .76;
          map[y][x] = "0";
        }
      }
    }

    // Pretty but deterministic flower placements on open cells, avoiding start/exit.
    const candidates = [];
    for(let y=1;y<rows-1;y++){
      for(let x=1;x<cols-1;x++){
        if(map[y][x] === "0"){
          const worldX = offsetX + x * cell + cell/2;
          const worldY = offsetY + y * cell + cell/2;
          const farFromPlayer = Math.hypot(worldX-player.x, worldY-player.y) > cell*2.4;
          const farFromExit = Math.hypot(worldX-(exit.x+cell/2), worldY-(exit.y+cell/2)) > cell*1.6;
          if(farFromPlayer && farFromExit) candidates.push({x,y});
        }
      }
    }
    candidates.sort((a,b)=>hashRand(seed + a.x*17+a.y*43) - hashRand(seed + b.x*17+b.y*43));
    const amount = Math.min(9 + levelIndex*2, Math.max(6, Math.floor(candidates.length / 6)));
    for(let i=0;i<amount && i<candidates.length;i++){
      const c = candidates[i];
      flowers.push({
        x: offsetX + c.x * cell + cell / 2,
        y: offsetY + c.y * cell + cell / 2,
        r: Math.max(5, cell * .18),
        phase: hashRand(seed+i)*Math.PI*2,
        color: ["#ff62ac","#ffca4e","#b76cff","#ff8c6b","#79d86d"][i%5],
        collected: keepCollected && i < oldCollected
      });
    }
    totalEl.textContent = flowers.length;
    updateHud();
  }

  function calibrate(){
    gyro.baseX = gyro.lastGamma || 0;
    gyro.baseY = gyro.lastBeta || 0;
    showToast("Calibrated ✨");
    if(navigator.vibrate) navigator.vibrate(20);
  }

  async function enableTilt(){
    mode = "gyro";
    joy.classList.remove("show");
    let ok = true;
    try{
      if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
        const perm = await DeviceOrientationEvent.requestPermission();
        ok = perm === "granted";
      }
    }catch(e){ ok = false; }

    if(!ok){
      mode = "touch";
      joy.classList.add("show");
      showToast("Tilt blocked — touch mode ready");
      return false;
    }

    if(!gyroReady){
      window.addEventListener("deviceorientation", e => {
        gyroReady = true;
        gyro.lastGamma = Number.isFinite(e.gamma) ? e.gamma : 0;
        gyro.lastBeta = Number.isFinite(e.beta) ? e.beta : 0;

        const gx = gyro.lastGamma - gyro.baseX;
        const by = gyro.lastBeta - gyro.baseY;

        // Clamp and soften. Positive beta usually tilts downward.
        gyro.x = clamp(gx / 18, -1, 1);
        gyro.y = clamp(by / 22, -1, 1);
      }, {passive:true});
    }
    showToast("Tilt to move 🌿");
    return true;
  }

  function setTouchMode(){
    mode = "touch";
    joy.classList.add("show");
    showToast("Use the joystick 🕹️");
  }

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function cellAt(px, py){
    const x = Math.floor((px - offsetX) / cell);
    const y = Math.floor((py - offsetY) / cell);
    if(x < 0 || y < 0 || x >= cols || y >= rows) return "1";
    return map[y][x];
  }

  function isWallAt(px,py){ return cellAt(px,py) === "1"; }

  function movePlayer(dt){
    const speedMult = parseFloat(speedInput.value);
    const baseSpeed = cell * 4.05 * speedMult;
    let ax = 0, ay = 0;

    if(mode === "gyro"){
      ax = gyro.x;
      ay = gyro.y;
    } else if(mode === "touch"){
      ax = joyVector.x;
      ay = joyVector.y;
    }

    if(keys.ArrowLeft || keys.a) ax -= 1;
    if(keys.ArrowRight || keys.d) ax += 1;
    if(keys.ArrowUp || keys.w) ay -= 1;
    if(keys.ArrowDown || keys.s) ay += 1;

    const len = Math.hypot(ax, ay);
    if(len > 1){ ax /= len; ay /= len; }

    player.vx = lerp(player.vx, ax * baseSpeed, 0.18);
    player.vy = lerp(player.vy, ay * baseSpeed, 0.18);

    const friction = 0.985;
    player.vx *= friction;
    player.vy *= friction;

    if(Math.hypot(player.vx, player.vy) > 12){
      player.dir = Math.atan2(player.vy, player.vx);
    }

    const nx = player.x + player.vx * dt;
    const ny = player.y + player.vy * dt;

    resolveMove(nx, player.y, "x");
    resolveMove(player.x, ny, "y");
  }

  function resolveMove(nx, ny, axis){
    const r = player.r * .82;
    const checks = [
      [nx-r, ny-r], [nx+r, ny-r], [nx-r, ny+r], [nx+r, ny+r],
      [nx, ny-r], [nx, ny+r], [nx-r, ny], [nx+r, ny]
    ];
    const hit = checks.some(([x,y]) => isWallAt(x,y));
    if(!hit){
      player.x = nx; player.y = ny;
    } else {
      if(axis === "x") player.vx *= -0.18;
      if(axis === "y") player.vy *= -0.18;
      // no screen shake on wall hit
    }
  }

  function lerp(a,b,t){ return a + (b-a)*t; }


  function getAudioCtx(){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    if(!audioCtx) audioCtx = new AC();
    if(audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playCollectSound(){
    if(isMuted || !collectSfx) return;

    try{
      // Selected sample: collect_flower_chime_01.wav
      const sfx = collectSfx.cloneNode(true);
      sfx.volume = 0.72;
      sfx.playbackRate = 0.98 + Math.random() * 0.08;
      sfx.play().catch(() => {});
    }catch(e){
      // Silent fallback if browser blocks audio.
    }
  }


  function updateHud(){
    const got = flowers.filter(f=>f.collected).length;
    scoreEl.textContent = got;
    if(gameState === "playing") elapsed = performance.now() - startedAt;
    const sec = Math.floor(elapsed / 1000);
    const m = Math.floor(sec / 60);
    const s = String(sec % 60).padStart(2,"0");
    timeEl.textContent = `${m}:${s}`;
    speedVal.textContent = Number(speedInput.value).toFixed(2) + "×";
  }

  function update(dt){
    if(gameState !== "playing") return;
    movePlayer(dt);

    for(const f of flowers){
      if(!f.collected && Math.hypot(player.x-f.x, player.y-f.y) < player.r + f.r + 3){
        f.collected = true;
        flowerBurst(f.x, f.y, f.color);
        playCollectSound();
        if(navigator.vibrate) navigator.vibrate(18);
        // no screen shake on flower pickup
      }
    }

    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 95 * dt;
      p.rot += p.spin * dt;
      if(p.life <= 0) particles.splice(i,1);
    }

    const inExit = player.x > exit.x && player.x < exit.x + exit.w && player.y > exit.y && player.y < exit.y + exit.h;
    if(inExit){
      win();
    }

    cameraShake *= .86;
    updateHud();
  }

  function flowerBurst(x,y,color){
    for(let i=0;i<18;i++){
      const a = Math.PI*2*i/18 + Math.random()*0.26;
      const sp = 60 + Math.random()*120;
      particles.push({
        x,y,
        vx: Math.cos(a)*sp,
        vy: Math.sin(a)*sp - 25,
        life: .45 + Math.random()*.55,
        maxLife: 1,
        size: 3 + Math.random()*6,
        color,
        rot: Math.random()*Math.PI,
        spin: -6 + Math.random()*12
      });
    }
  }

  function win(){
    gameState = "win";
    const got = flowers.filter(f=>f.collected).length;
    const sec = Math.floor(elapsed/1000);
    perfectMessage = got === flowers.length ? "Perfect garden score 🌸" : `Collected ${got}/${flowers.length} flowers 🌼`;
    winText.textContent = `${perfectMessage} · Time ${Math.floor(sec/60)}:${String(sec%60).padStart(2,"0")}`;
    createConfetti();
    setTimeout(()=>winPanel.classList.remove("hidden"), 520);
    if(navigator.vibrate) navigator.vibrate([35,50,35]);
  }

  function createConfetti(){
    confetti = [];
    const colors = ["#ff4f9e","#ffd25e","#78d67c","#8b6cff","#ff8d5d","#ffffff"];
    for(let i=0;i<130;i++){
      confetti.push({
        x: Math.random()*W,
        y: -20 - Math.random()*H*.55,
        vx: -40 + Math.random()*80,
        vy: 110 + Math.random()*210,
        s: 4 + Math.random()*8,
        r: Math.random()*Math.PI,
        spin: -8 + Math.random()*16,
        color: colors[i%colors.length]
      });
    }
  }


  function initButterflies(force=false){
    if(!force && butterflies.length) return;
    const count = W < 380 ? 5 : 8;
    const colors = [
      ["#ff79bd", "#ffd6eb"],
      ["#ffd25e", "#fff0a8"],
      ["#b982ff", "#ead7ff"],
      ["#79d86d", "#d8ffd1"],
      ["#ff9a6c", "#ffe1cf"]
    ];

    butterflies = Array.from({length:count}, (_, i) => {
      const palette = colors[i % colors.length];
      return {
        x: (i * 83 + 41) % Math.max(1,W),
        y: 90 + ((i * 137 + 29) % Math.max(1,H - 210)),
        baseY: 90 + ((i * 137 + 29) % Math.max(1,H - 210)),
        vx: (i % 2 ? 1 : -1) * (12 + (i % 4) * 5),
        phase: i * 1.7,
        flap: .8 + (i % 3) * .18,
        scale: (W < 380 ? .72 : .88) + (i % 4) * .12,
        color1: palette[0],
        color2: palette[1],
        alpha: .58 + (i % 3) * .12
      };
    });
  }

  function updateButterflies(dt){
    if(!butterflies.length) initButterflies();

    const t = performance.now() / 1000;
    for(const b of butterflies){
      b.x += b.vx * dt;
      b.y = b.baseY + Math.sin(t * .85 + b.phase) * 24 + Math.sin(t * 1.7 + b.phase * .7) * 8;

      // Let them wrap naturally around the garden.
      const margin = 44;
      if(b.vx > 0 && b.x > W + margin){
        b.x = -margin;
        b.baseY = 86 + Math.random() * Math.max(1, H - 230);
      }
      if(b.vx < 0 && b.x < -margin){
        b.x = W + margin;
        b.baseY = 86 + Math.random() * Math.max(1, H - 230);
      }
    }
  }

  function drawButterflies(){
    if(!butterflies.length) return;

    const t = performance.now() / 1000;
    ctx.save();

    for(const b of butterflies){
      const wing = Math.sin(t * 9.5 * b.flap + b.phase);
      const wingOpen = .72 + Math.abs(wing) * .42;
      const angle = Math.sin(t * .9 + b.phase) * .18 + (b.vx < 0 ? Math.PI : 0);

      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(angle);
      ctx.scale(b.scale, b.scale);
      ctx.globalAlpha = b.alpha;

      // soft glow
      ctx.fillStyle = "rgba(255,255,255,.22)";
      ctx.beginPath();
      ctx.ellipse(0, 2, 20, 13, 0, 0, Math.PI * 2);
      ctx.fill();

      // wings
      const gradL = ctx.createRadialGradient(-8, -5, 2, -9, -7, 18);
      gradL.addColorStop(0, b.color2);
      gradL.addColorStop(1, b.color1);

      ctx.fillStyle = gradL;
      ctx.beginPath();
      ctx.ellipse(-8, -7, 9 * wingOpen, 13, -.58, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(8, -7, 9 * wingOpen, 13, .58, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = b.alpha * .9;
      ctx.beginPath();
      ctx.ellipse(-7, 7, 7 * wingOpen, 9, .48, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(7, 7, 7 * wingOpen, 9, -.48, 0, Math.PI * 2);
      ctx.fill();

      // body
      ctx.globalAlpha = Math.min(1, b.alpha + .1);
      ctx.fillStyle = "rgba(72,57,49,.78)";
      ctx.beginPath();
      ctx.ellipse(0, 0, 2.2, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      // antennae
      ctx.strokeStyle = "rgba(72,57,49,.55)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-1, -8);
      ctx.quadraticCurveTo(-8, -15, -12, -12);
      ctx.moveTo(1, -8);
      ctx.quadraticCurveTo(8, -15, 12, -12);
      ctx.stroke();

      ctx.restore();
    }

    ctx.restore();
  }


  function draw(){
    ctx.save();
    ctx.translate(0,0);

    drawBackground();
    drawMaze();
    drawButterflies();
    drawExit();
    drawFlowers();
    drawDuck();
    drawParticles();
    ctx.restore();
    drawConfetti();
    requestAnimationFrame(draw);
  }

  function drawBackground(){
    const g = ctx.createLinearGradient(0,0,W,H);
    g.addColorStop(0,"#fff7e7");
    g.addColorStop(.48,"#eaf9e9");
    g.addColorStop(1,"#ffe7f2");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // subtle dotted garden texture
    ctx.globalAlpha = .48;
    for(let i=0;i<90;i++){
      const x = (i*73 + levelIndex*47) % W;
      const y = (i*131 + levelIndex*91) % H;
      const r = 1.2 + (i%5)*.36;
      ctx.fillStyle = i%3 === 0 ? "#ffd2e7" : i%3 === 1 ? "#d9f3d9" : "#ffe8a7";
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawBigDecorFlower(W*.12,H*.88,22,"#ff8fc7");
    drawBigDecorFlower(W*.88,H*.16,20,"#ffd36f");
    drawBigDecorFlower(W*.77,H*.90,16,"#9fe38f");
    drawTitleRibbon();
  }

  function drawTitleRibbon(){
    ctx.save();
    ctx.globalAlpha = .94;
    const titleX = W < 380 ? 18 : Math.max(28, W*.12);
    const titleW = W < 380 ? W - 36 : W - Math.max(56, W*.24);
    roundRect(titleX, 50, titleW, 32, 16);
    ctx.fillStyle = "rgba(255,255,255,.48)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.72)";
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#294136";
    ctx.font = "900 13px ui-rounded, system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("Flowers Maze", W/2, 66);
    ctx.restore();
  }

  function drawBigDecorFlower(x,y,r,color){
    ctx.save();
    ctx.translate(x,y);
    ctx.globalAlpha=.26;
    for(let i=0;i<8;i++){
      ctx.rotate(Math.PI/4);
      ctx.fillStyle=color;
      ctx.beginPath();
      ctx.ellipse(0,-r*.85,r*.36,r*.75,0,0,Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle="#ffd25e";
    ctx.beginPath(); ctx.arc(0,0,r*.32,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawMaze(){
    if(!map) return;

    // path base
    roundRect(offsetX-8, offsetY-8, cols*cell+16, rows*cell+16, 24);
    ctx.fillStyle = "rgba(255,255,255,.50)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.74)";
    ctx.lineWidth = 1;
    ctx.stroke();

    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        const px = offsetX + x*cell;
        const py = offsetY + y*cell;
        if(map[y][x] === "1"){
          drawHedge(px,py,cell,cell,x,y);
        } else {
          drawPathTile(px,py,cell,cell,x,y);
        }
      }
    }
  }

  function drawPathTile(x,y,w,h,cx,cy){
    const hue = (cx + cy + levelIndex) % 2;
    ctx.fillStyle = hue ? "rgba(255,250,224,.82)" : "rgba(248,242,205,.80)";
    ctx.fillRect(x,y,w,h);

    if((cx*13+cy*7+levelIndex)%9===0){
      ctx.fillStyle = "rgba(116,177,91,.22)";
      ctx.beginPath();
      ctx.ellipse(x+w*.28,y+h*.72,w*.16,h*.07,-.7,0,Math.PI*2);
      ctx.ellipse(x+w*.42,y+h*.68,w*.13,h*.055,.6,0,Math.PI*2);
      ctx.fill();
    }
  }

  function drawHedge(x,y,w,h,cx,cy){
    const grd = ctx.createLinearGradient(x,y,x,y+h);
    grd.addColorStop(0,"#76c970");
    grd.addColorStop(.52,"#4eaa59");
    grd.addColorStop(1,"#2f8248");
    ctx.fillStyle = grd;
    roundRect(x+1,y+1,w-2,h-2, Math.max(6,w*.22));
    ctx.fill();

    // Leaf shine blobs
    ctx.globalAlpha = .48;
    ctx.fillStyle = "#a9ee9d";
    for(let i=0;i<3;i++){
      const rx = x + ((cx*19+cy*7+i*11)%100)/100*w;
      const ry = y + ((cy*23+cx*5+i*17)%100)/100*h;
      ctx.beginPath();
      ctx.ellipse(rx, ry, w*.13, h*.055, (i+cx)*.8, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Flower sprinkles
    if((cx*31+cy*11+levelIndex)%5===0){
      const fx = x + w*.72, fy = y + h*.25;
      drawMiniFlower(fx,fy,Math.max(3,w*.10), ["#ff77b7","#ffe066","#c08cff"][(cx+cy)%3]);
    }
  }

  function drawExit(){
    ctx.save();
    const t = performance.now()/1000;
    const cx = exit.x + exit.w/2;
    const cy = exit.y + exit.h/2;
    const w = exit.w * .78;
    const h = exit.h * .92;
    const x = cx - w/2;
    const y = cy - h/2;

    // soft golden glow behind the door
    ctx.globalAlpha = .22 + Math.sin(t*3)*.04;
    ctx.fillStyle = "#ffd25e";
    ctx.beginPath();
    ctx.ellipse(cx, cy, w*.78, h*.70, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // arched wooden door
    const g = ctx.createLinearGradient(x, y, x+w, y+h);
    g.addColorStop(0, "#b87535");
    g.addColorStop(.5, "#8f5527");
    g.addColorStop(1, "#6d3a1e");

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(x, y+h);
    ctx.lineTo(x, y+h*.42);
    ctx.quadraticCurveTo(cx, y-h*.18, x+w, y+h*.42);
    ctx.lineTo(x+w, y+h);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(72,38,18,.55)";
    ctx.lineWidth = Math.max(2, cell*.07);
    ctx.stroke();

    // door planks
    ctx.strokeStyle = "rgba(255,222,156,.26)";
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(x+w*.33, y+h*.24); ctx.lineTo(x+w*.33, y+h*.96);
    ctx.moveTo(x+w*.66, y+h*.24); ctx.lineTo(x+w*.66, y+h*.96);
    ctx.stroke();

    // cute frame leaves
    ctx.fillStyle = "#4c9b4f";
    for(let i=0;i<8;i++){
      const side = i%2 ? 1 : -1;
      const yy = y + h*(.25 + i*.075);
      const xx = cx + side*w*.58;
      ctx.beginPath();
      ctx.ellipse(xx, yy, cell*.08, cell*.16, side*.75, 0, Math.PI*2);
      ctx.fill();
    }

    // knob
    ctx.fillStyle = "#ffd25e";
    ctx.beginPath();
    ctx.arc(x+w*.73, y+h*.62, Math.max(3, cell*.09), 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "rgba(89,56,20,.42)";
    ctx.lineWidth = 1;
    ctx.stroke();

    // little welcome step
    ctx.fillStyle = "rgba(92,70,43,.18)";
    ctx.beginPath();
    ctx.ellipse(cx, y+h+cell*.05, w*.58, cell*.10, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function drawFlowers(){
    const t = performance.now()/1000;
    for(const f of flowers){
      if(f.collected) continue;
      const bob = Math.sin(t*3 + f.phase)*2;
      drawMiniFlower(f.x, f.y + bob, f.r, f.color, true);
    }
  }

  function drawMiniFlower(x,y,r,color,glow=false){
    ctx.save();
    ctx.translate(x,y);
    if(glow){
      ctx.globalAlpha=.18;
      ctx.fillStyle=color;
      ctx.beginPath(); ctx.arc(0,0,r*2.3,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
    for(let i=0;i<6;i++){
      ctx.rotate(Math.PI/3);
      ctx.fillStyle=color;
      ctx.beginPath();
      ctx.ellipse(0,-r*.82,r*.42,r*.78,0,0,Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle="#ffe36d";
    ctx.beginPath(); ctx.arc(0,0,r*.42,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawDuck(){
    const x = player.x, y = player.y;
    const r = player.r;
    const t = performance.now()/1000;
    const walk = Math.sin(t*12) * clamp(Math.hypot(player.vx,player.vy)/180,0,1);
    const angle = player.dir;

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.scale(1 + walk*.03, 1 - walk*.02);

    // shadow
    ctx.save();
    ctx.rotate(-angle);
    ctx.globalAlpha=.24;
    ctx.fillStyle="#415644";
    ctx.beginPath(); ctx.ellipse(0,r*.78,r*1.22,r*.38,0,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // body
    const bodyGrad = ctx.createLinearGradient(-r,-r,r,r);
    bodyGrad.addColorStop(0,"#fff09a");
    bodyGrad.addColorStop(.65,"#ffd352");
    bodyGrad.addColorStop(1,"#ffc13b");
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(-r*.08,0,r*1.05,r*.82,0,0,Math.PI*2);
    ctx.fill();

    // wing
    ctx.fillStyle="rgba(231,154,34,.34)";
    ctx.beginPath();
    ctx.ellipse(-r*.34,r*.08,r*.46,r*.27,-.25,0,Math.PI*2);
    ctx.fill();

    // head
    ctx.fillStyle="#ffe27a";
    ctx.beginPath();
    ctx.arc(r*.55,-r*.45,r*.56,0,Math.PI*2);
    ctx.fill();

    // beak
    ctx.fillStyle="#ff9d38";
    ctx.beginPath();
    ctx.ellipse(r*1.12,-r*.40,r*.42,r*.21,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="rgba(154,74,18,.18)";
    ctx.fillRect(r*.98,-r*.40,r*.31,1.4);

    // eye
    ctx.fillStyle="#26332b";
    ctx.beginPath();
    ctx.arc(r*.70,-r*.60,r*.105,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(r*.74,-r*.64,r*.036,0,Math.PI*2);
    ctx.fill();

    // blush
    ctx.fillStyle="rgba(255,111,157,.35)";
    ctx.beginPath();
    ctx.ellipse(r*.63,-r*.27,r*.12,r*.06,0,0,Math.PI*2);
    ctx.fill();

    // feet
    ctx.fillStyle="#f28b28";
    ctx.beginPath();
    ctx.ellipse(-r*.32,r*.78,r*.22,r*.09,walk*.55,0,Math.PI*2);
    ctx.ellipse(r*.28,r*.78,r*.22,r*.09,-walk*.55,0,Math.PI*2);
    ctx.fill();

    // tiny head flower
    ctx.save();
    ctx.translate(r*.25,-r*1.02);
    ctx.rotate(-angle + Math.sin(t*3)*.08);
    drawMiniFlower(0,0,r*.22,"#ff6eb1",false);
    ctx.restore();

    ctx.restore();
  }

  function drawParticles(){
    for(const p of particles){
      const a = clamp(p.life / p.maxLife, 0, 1);
      ctx.save();
      ctx.globalAlpha = Math.min(1, p.life * 2);
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.ellipse(0,0,p.size*.65,p.size*.26,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawConfetti(){
    if(confetti.length === 0) return;
    ctx.save();
    for(let i=confetti.length-1;i>=0;i--){
      const c = confetti[i];
      c.x += c.vx/60;
      c.y += c.vy/60;
      c.r += c.spin/60;
      c.vy += 2.2;
      ctx.save();
      ctx.translate(c.x,c.y);
      ctx.rotate(c.r);
      ctx.fillStyle=c.color;
      ctx.globalAlpha = clamp(1 - (c.y-H*.72)/(H*.5), .12, 1);
      roundRect(-c.s/2,-c.s/3,c.s,c.s*.66,2);
      ctx.fill();
      ctx.restore();
      if(c.y > H+60) confetti.splice(i,1);
    }
    ctx.restore();
  }

  function roundRect(x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function startGame(useTilt){
    getAudioCtx();
    if(collectSfx){
      collectSfx.volume = 0.72;
      collectSfx.load();
    }
    startPanel.classList.add("hidden");
    winPanel.classList.add("hidden");
    loadLevel(levelIndex);
    if(useTilt) {
      enableTilt().then(ok => {
        if(ok) setTimeout(calibrate, 350);
      });
    } else {
      setTouchMode();
    }
  }

  // Touch joystick
  let joyActive = false;
  function joyPoint(e){
    const touch = e.touches ? e.touches[0] : e;
    const rect = joy.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    let dx = touch.clientX - cx;
    let dy = touch.clientY - cy;
    const max = rect.width*.36;
    const len = Math.hypot(dx,dy);
    if(len > max){ dx = dx/len*max; dy = dy/len*max; }
    knob.style.transform = `translate(${dx}px,${dy}px)`;
    joyVector.x = dx / max;
    joyVector.y = dy / max;
  }
  function joyEnd(){
    joyActive = false;
    knob.style.transform = "translate(0,0)";
    joyVector.x = 0; joyVector.y = 0;
  }
  joy.addEventListener("pointerdown", e => { joyActive=true; joy.setPointerCapture(e.pointerId); joyPoint(e); });
  joy.addEventListener("pointermove", e => { if(joyActive) joyPoint(e); });
  joy.addEventListener("pointerup", joyEnd);
  joy.addEventListener("pointercancel", joyEnd);

  window.addEventListener("keydown", e => {
    keys[e.key] = true;
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
    if(gameState === "menu" && e.key === "Enter") startGame(false);
  }, {passive:false});
  window.addEventListener("keyup", e => keys[e.key] = false);

  if(muteBtn){
    muteBtn.addEventListener("click", () => {
      isMuted = !isMuted;
      muteBtn.textContent = isMuted ? "🔇" : "🔊";
      muteBtn.setAttribute("aria-label", isMuted ? "Unmute sound" : "Mute sound");
      if(collectSfx) collectSfx.muted = isMuted;
    });
  }

  playBtn.addEventListener("click", () => startGame(true));
  touchBtn.addEventListener("click", () => startGame(false));
  calibrateBtn.addEventListener("click", calibrate);
  nextBtn.addEventListener("click", () => { winPanel.classList.add("hidden"); loadLevel(levelIndex+1); });
  againBtn.addEventListener("click", () => { winPanel.classList.add("hidden"); loadLevel(levelIndex); });
  speedInput.addEventListener("input", updateHud);

  // Prevent mobile page gestures from stealing the game.
  document.addEventListener("touchmove", e => e.preventDefault(), {passive:false});

  let last = performance.now();
  function loop(now){
    const dt = Math.min(.033, (now-last)/1000);
    last = now;
    updateButterflies(dt);
    update(dt);
    requestAnimationFrame(loop);
  }

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", () => setTimeout(resize, 180));

  resize();
  draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
